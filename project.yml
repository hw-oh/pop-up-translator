name: PopUpTranslator
options:
  bundleIdPrefix: com.popuptranslator
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.1"

targets:
  PopUpTranslator:
    type: application
    platform: macOS
    sources:
      - PopUpTranslator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.popuptranslator.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: PopUpTranslator/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: PopUpTranslator/PopUpTranslator.entitlements
    dependencies:
      - package: HotKey
    info:
      path: PopUpTranslator/Info.plist
